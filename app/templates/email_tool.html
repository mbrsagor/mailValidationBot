{% extends 'base.html' %}

{% block title %}
  Email Validation Tool
{% endblock %}

{% block content %}
  <div class="container mt-5">
    <div class="row">
      <div class="col-md-12">
        <div class="card">
          <div class="card-body">
            <h2>Email Bulk Validator (50k Max Limit)</h2>
            <form id="emailForm">
              {% csrf_token %}
              <label class="form-label">Paste Emails (Comma, Space, or New Line separated)</label>
              <textarea name="emails" id="emails" class="form-control mb-3" rows="10" placeholder="Paste emails here..."></textarea>
              <button type="submit" class="btn btn-primary mt-3" id="startBtn">Start Validation</button>
            </form>

            <div id="progressContainer" class="mt-4" style="display:none;">
              <div class="progress">
                <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%">0%</div>
              </div>
              <p id="statusText" class="mt-2 text-muted">Processing...</p>
              <a id="downloadBtn" href="#" class="btn btn-success" style="display:none;" download>Download Valid List</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('emailForm').onsubmit = async (e) => {
      e.preventDefault()
    
      const startBtn = document.getElementById('startBtn')
      const formData = new FormData(e.target)
    
      // Disable UI and show progress
      startBtn.disabled = true
      startBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Processing...'
      document.getElementById('progressContainer').style.display = 'block'
      document.getElementById('downloadBtn').style.display = 'none'
    
      try {
        const response = await fetch("{% url 'email_tool' %}", {
          method: 'POST',
          body: formData,
          headers: {
            'X-CSRFToken': '{{ csrf_token }}' // Standard way to handle CSRF in JS
          }
        })
    
        const data = await response.json()
    
        if (data.task_id) {
          checkProgress(data.task_id)
        } else {
          alert('Error starting task. Please try again.')
          startBtn.disabled = false
          startBtn.innerText = 'Start Validation'
        }
      } catch (error) {
        console.error('Error:', error)
        startBtn.disabled = false
      }
    }
    
    function checkProgress(taskId) {
      const interval = setInterval(async () => {
        // Using backticks for dynamic URL
        const res = await fetch(`/progress/${taskId}/`)
        const data = await res.json()
    
        // Update progress bar
        if (data.state === 'PROGRESS' || data.state === 'SUCCESS') {
          const percent = data.percent || 0
          const pBar = document.getElementById('progressBar')
          pBar.style.width = percent + '%'
          pBar.innerText = percent + '%'
        }
    
        // When task is complete
        if (data.state === 'SUCCESS') {
          clearInterval(interval)
          document.getElementById('statusText').innerText = 'Validation Complete!'
          document.getElementById('statusText').classList.replace('text-muted', 'text-success')
    
          // Show download link
          const dlBtn = document.getElementById('downloadBtn')
          dlBtn.href = data.file_url
          dlBtn.style.display = 'inline-block'
    
          // Re-enable start button
          const startBtn = document.getElementById('startBtn')
          startBtn.disabled = false
          startBtn.innerText = 'Start New Validation'
        }
      }, 2000)
    }
  </script>
{% endblock %}
